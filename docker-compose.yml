services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: home-server-admin-app:latest
    container_name: home-server-admin-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
