name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  APP_NAME: home-server-admin
  DEPLOY_PATH: /home/winterholic/projects/services/home-server-admin/backend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Flake8
      run: |
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Run tests
      run: |
        if [ -d "tests" ] && [ "$(ls -A tests 2>/dev/null)" ]; then
          pytest tests/ -v --cov=app --cov-report=term
        else
          echo "No tests found. Skipping test execution."
        fi
      continue-on-error: true

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        cat > .env << EOF
        DB_HOST=${{ secrets.DB_HOST }}
        DB_PORT=${{ secrets.DB_PORT }}
        DB_USER=${{ secrets.DB_USER }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DB_NAME=${{ secrets.DB_NAME }}

        APP_HOST=0.0.0.0
        APP_PORT=5004
        APP_DEBUG=false
        SECRET_KEY=${{ secrets.SECRET_KEY }}

        CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}

        SMTP_HOST=smtp.naver.com
        SMTP_PORT=465
        SMTP_USER=${{ secrets.SMTP_USER }}
        SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
        SMTP_FROM=${{ secrets.SMTP_FROM }}

        NGINX_ACCESS_LOG=${{ secrets.NGINX_ACCESS_LOG }}
        NGINX_ERROR_LOG=${{ secrets.NGINX_ERROR_LOG }}
        AUTH_LOG=${{ secrets.AUTH_LOG }}
        SYSLOG=${{ secrets.SYSLOG }}
        FAIL2BAN_LOG=${{ secrets.FAIL2BAN_LOG }}
        EOF

    - name: Copy files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "."
        target: ${{ env.DEPLOY_PATH }}
        rm: false
        overwrite: true
        exclude: ".git"

    - name: Deploy with Docker Compose
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          echo "🚀 Starting deployment..."

          cd ${{ env.DEPLOY_PATH }}

          mkdir -p logs

          chmod +x scripts/deploy.sh

          ./scripts/deploy.sh

          echo "✅ Deployment completed!"

    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd ${{ env.DEPLOY_PATH }}

          echo "📊 Checking service status..."
          docker compose ps

          echo ""
          echo "🔍 Checking app health..."
          sleep 10
          curl -f http://localhost:5004/api/health || echo "⚠️ Health check failed"

          echo ""
          echo "📝 Recent logs:"
          docker compose logs --tail=20 app

    - name: Cleanup old resources
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          echo "🧹 Cleaning up old Docker resources..."
          docker image prune -f
          echo "✅ Cleanup completed"
      continue-on-error: true
